name: shadow-node-web

services:
  web:
    image: docker.io/library/node:24-bookworm
    working_dir: /workspace
    command: sh -lc "corepack enable && bun install && bun run dev"
    environment:
      NODE_ENV: development
    volumes:
      - .:/workspace
    expose:
      - "3000"
      - "4000"
      - "4200"
